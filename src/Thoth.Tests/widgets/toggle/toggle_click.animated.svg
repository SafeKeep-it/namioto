<svg xmlns="http://www.w3.org/2000/svg" width="800" height="432" viewBox="0 0 800 432">
  <style>
    .thoth-f0 { animation: thoth-kf0 5.0s linear infinite; }
    .thoth-f1 { animation: thoth-kf1 5.0s linear infinite; }
    .thoth-f2 { animation: thoth-kf2 5.0s linear infinite; }
    @keyframes thoth-kf0 { 0%,30.00%{opacity:1} 30.01%,100%{opacity:0} }
    @keyframes thoth-kf1 { 0%,30.00%{opacity:0} 30.01%,70.00%{opacity:1} 70.01%,100%{opacity:0} }
    @keyframes thoth-kf2 { 0%,70.00%{opacity:0} 70.01%,100%{opacity:1} }
  </style>
  <rect width="100%" height="100%" fill="#0d1117"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="13" text-rendering="optimizeSpeed">
    <g class="thoth-f0">
      <text x="1" y="13" fill="#e0d2ae">☐</text>
      <polygon transform="translate(10,0)" points="0,0 0,14 4,10 7,16 10,14 7,8 12,8" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    </g>
    <g class="thoth-f1">
      <text x="1" y="13" fill="#2ea043">☑</text>
      <polygon transform="translate(10,0)" points="0,0 0,14 4,10 7,16 10,14 7,8 12,8" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    </g>
    <g class="thoth-f2">
      <text x="1" y="13" fill="#e0d2ae">☐</text>
      <polygon transform="translate(10,0)" points="0,0 0,14 4,10 7,16 10,14 7,8 12,8" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    </g>
  </g>
</svg>
