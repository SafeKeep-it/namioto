<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360">
  <rect width="920" height="360" fill="#111218"/>
  <text x="24" y="36" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="22">Thoth Neutral Theme Preview</text>
  <text x="24" y="60" fill="#9aa0ad" font-family="Menlo, Consolas, monospace" font-size="14">Baseline compatibility palette</text>

  <g font-family="Menlo, Consolas, monospace" font-size="14">
    <rect x="24" y="88" width="280" height="52" rx="6" fill="#1e1e28" stroke="#505064"/>
    <text x="320" y="120" fill="#d9dbe3">background  #1e1e28</text>

    <rect x="24" y="146" width="280" height="52" rx="6" fill="#ffffff" stroke="#505064"/>
    <text x="320" y="178" fill="#d9dbe3">text        #ffffff</text>

    <rect x="24" y="204" width="280" height="52" rx="6" fill="#808080" stroke="#505064"/>
    <text x="320" y="236" fill="#d9dbe3">dim         #808080</text>

    <rect x="24" y="262" width="280" height="52" rx="6" fill="#505064" stroke="#7a7f95"/>
    <text x="320" y="294" fill="#d9dbe3">border      #505064</text>
  </g>

  <g font-family="Menlo, Consolas, monospace" font-size="14">
    <rect x="500" y="88" width="280" height="52" rx="6" fill="#ffa500" stroke="#505064"/>
    <text x="792" y="120" fill="#d9dbe3">accent  #ffa500</text>

    <rect x="500" y="146" width="280" height="52" rx="6" fill="#ffd166" stroke="#505064"/>
    <text x="792" y="178" fill="#d9dbe3">notify  #ffd166</text>

    <rect x="500" y="204" width="280" height="52" rx="6" fill="#00ff00" stroke="#505064"/>
    <text x="792" y="236" fill="#d9dbe3">success #00ff00</text>

    <rect x="500" y="262" width="280" height="52" rx="6" fill="#ff0000" stroke="#505064"/>
    <text x="792" y="294" fill="#d9dbe3">error   #ff0000</text>
  </g>
